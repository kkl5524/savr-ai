[build]
  publish = "."
  functions = "netlify/functions"

# Nutrition lookup — POST /api/nutrition → Supabase dataset (no external API)
[[redirects]]
  from = "/api/nutrition"
  to   = "/.netlify/functions/nutrition"
  status = 200

[[redirects]]
  from = "/api/search"
  to   = "/.netlify/functions/search"
  status = 200

[[redirects]]
  from = "/api/forum/recent"
  to   = "/.netlify/functions/forum/recent"
  status = 200

[[redirects]]
  from = "/api/forum/profile"
  to   = "/.netlify/functions/forum/profile"
  status = 200

[[redirects]]
  from = "/api/forum"
  to   = "/.netlify/functions/forum"
  status = 200